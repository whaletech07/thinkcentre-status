name: Automatic Status Checker

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: status-monitor
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  auto:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync state
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
        run: |
          # i have no idea what im doing
          
          set -euo pipefail # "Remember to set -euo pipefail, because Bash will take any opportunity to delete your whole computer." -some youtuber idk

          notify_discord() {
            local message="$1"

            curl -fsS \
              -H "Content-Type: application/json" \
              -X POST \
              -d "$(jq -nc --arg m "$message" '{content:$m}')" \
              "$DISCORD_WEBHOOK" >/dev/null || true
          }

          notify_email() {
            local subject="$1"
            local body="$2"

            curl -fsS https://api.resend.com/emails \
              -H "Authorization: Bearer $RESEND_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -nc \
                --arg from "status@whalete.ch" \
                --arg to "$ALERT_EMAIL" \
                --arg subject "$subject" \
                --arg text "$body" \
                '{
                  from:$from,
                  to:[$to],
                  subject:$subject,
                  text:$text
                }'
              )" >/dev/null || true
          }

          check() {
            local code

            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 5 "$1" || echo 000)

            if [ "$code" -ge 200 ] && [ "$code" -lt 400 ]; then
              echo "UP"
            else
              echo "DOWN"
            fi
          }

          mkdir -p output

          INCIDENTS="output/incidents.json"
          PREV_STATE_FILE="output/.prev-state.json"

          [ -f "$INCIDENTS" ] || echo "[]" > "$INCIDENTS"
          [ -f "$PREV_STATE_FILE" ] || echo '{"services":{}}' > "$PREV_STATE_FILE"

          DNS_IP=$(getent ahosts whaletech07.ddns.net | awk '{print $1; exit}')

          if [ -n "$DNS_IP" ]; then
            DNS="UP"
          else
            DNS="DOWN"
          fi

          if [ "$DNS" = "UP" ]; then
            HOME=$(check "https://whaletech07.ddns.net/ping")
          else
            HOME="DOWN"
          fi

          if [ "$HOME" = "UP" ]; then
            MC=$(check "https://mc.whalete.ch")
            FILES=$(check "https://files.whalete.ch")
            GIT=$(check "https://git.whalete.ch")
            MATRIX=$(check "https://matrix.whalete.ch")
            MAST=$(check "https://mast.whalete.ch")
            NAVIDROME=$(check "https://navidrome.whalete.ch")
            TOOLS=$(check "https://tools.whalete.ch")
            LEGACY=$(check "https://legacy.whalete.ch")
          else
            MC="UNKNOWN"
            FILES="UNKNOWN"
            GIT="UNKNOWN"
            MATRIX="UNKNOWN"
            MAST="UNKNOWN"
            NAVIDROME="UNKNOWN"
            TOOLS="UNKNOWN"
            LEGACY="UNKNOWN"
          fi

          CURRENT=$(jq -n \
            --arg dns "$DNS" \
            --arg home "$HOME" \
            --arg mc "$MC" \
            --arg files "$FILES" \
            --arg git "$GIT" \
            --arg matrix "$MATRIX" \
            --arg mast "$MAST" \
            --arg navidrome "$NAVIDROME" \
            --arg tools "$TOOLS" \
            --arg legacy "$LEGACY" \
            '{
              services: {
                dns: $dns,
                home: $home,
                mc: $mc,
                files: $files,
                git: $git,
                matrix: $matrix,
                mast: $mast,
                navidrome: $navidrome,
                tools: $tools,
                legacy: $legacy
              }
            }'
          )

          LAST_DATA=$(cat "$PREV_STATE_FILE")

          while read -r s; do

            CUR=$(jq -r ".services.\"$s\"" <<< "$CURRENT")
            PREV=$(jq -r ".services.\"$s\" // \"UP\"" <<< "$LAST_DATA")

            if [ "$CUR" = "DOWN" ] && [ "$PREV" != "DOWN" ]; then

              ID="$s-$(date -u +%s)"

              TMP=$(mktemp)

              jq \
                --arg id "$ID" \
                --arg s "$s" \
                --arg t "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
                '
                [{
                  id: $id,
                  title: ($s + " outage"),
                  description: ("Service " + $s + " went DOWN"),
                  severity: "critical",
                  services: [$s],
                  status: "ongoing",
                  time: $t,
                  auto: true
                }] + .
                ' "$INCIDENTS" > "$TMP"

              mv "$TMP" "$INCIDENTS"

              MESSAGE="Service $s went DOWN"

              notify_discord "$MESSAGE"

              notify_email \
                "ThinkCentre Alert: $s DOWN" \
                "$MESSAGE"
            fi

            if [ "$CUR" = "UP" ] && [ "$PREV" = "DOWN" ]; then

              TMP=$(mktemp)

              jq \
                --arg s "$s" \
                '
                map(
                  if (.services | index($s)) and .status == "ongoing" then
                    .status = "resolved"
                  else
                    .
                  end
                )
                ' "$INCIDENTS" > "$TMP"

              mv "$TMP" "$INCIDENTS"

              MESSAGE="Service $s is back UP"

              notify_discord "$MESSAGE"

              notify_email \
                "ThinkCentre Alert: $s UP" \
                "$MESSAGE"
            fi

          done < <(jq -r '.services | keys[]' <<< "$CURRENT")

          echo "$CURRENT" > "$PREV_STATE_FILE"

      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

          git add output/

          git diff --cached --quiet && exit 0

          git commit -m "Auto monitoring update"

          git pull --rebase origin main
          git push origin HEAD:main
