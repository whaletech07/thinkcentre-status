name: Incident Editor

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Create or resolve"
        required: true
        type: choice
        options:
          - Create
          - Resolve

      id:
        description: "Incident ID (resolve)"
        required: false

      title:
        description: "Title (create)"
        required: false

      description:
        description: "Description (create)"
        required: false

      severity:
        description: "Severity"
        required: false
        type: choice
        options:
          - degraded
          - critical

      services:
        description: "Services (comma-separated, create)"
        required: false

permissions:
  contents: write

jobs:
  manual:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync state
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Prepare
        run: |
          mkdir -p output
          [ -f output/incidents.json ] || echo "[]" > output/incidents.json

      - name: Add/edit incident
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          set -euo pipefail

          notify_discord() {
            local message="$1"

            curl -fsS \
              -H "Content-Type: application/json" \
              -X POST \
              -d "$(jq -nc --arg m "$message" '{content:$m}')" \
              "$DISCORD_WEBHOOK" >/dev/null || true
          }

          FILE="output/incidents.json"

          ACTION="$(echo "${{ github.event.inputs.action }}" | tr '[:upper:]' '[:lower:]')"
          INCIDENT_ID="${{ github.event.inputs.id }}"
          TITLE="${{ github.event.inputs.title }}"
          DESC="${{ github.event.inputs.description }}"
          SEVERITY="${{ github.event.inputs.severity }}"
          SERVICES="${{ github.event.inputs.services }}"

          if [ "$ACTION" = "create" ]; then

            if [ -z "$TITLE" ]; then
              echo "Title is required"
              exit 1
            fi

            if [ -z "$SEVERITY" ]; then
              SEVERITY="degraded"
            fi

            ID="$(echo "$TITLE" \
              | tr '[:upper:]' '[:lower:]' \
              | sed 's/[^a-z0-9]/-/g' \
              | tr -s '-' \
              | sed 's/^-//;s/-$//')-$(date -u +%s)"

            if [ -z "$SERVICES" ]; then
              SERVICES_JSON="[]"
            else
              SERVICES_JSON=$(
                echo "$SERVICES" |
                tr ',' '\n' |
                sed 's/^ *//;s/ *$//' |
                sed '/^$/d' |
                jq -R . |
                jq -s .
              )
            fi

            TMP=$(mktemp)

            jq \
              --arg id "$ID" \
              --arg title "$TITLE" \
              --arg desc "$DESC" \
              --arg severity "$SEVERITY" \
              --arg time "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
              --argjson services "$SERVICES_JSON" \
              '
              [{
                id: $id,
                title: $title,
                description: $desc,
                severity: $severity,
                services: $services,
                status: "ongoing",
                time: $time,
                auto: false
              }] + .
              ' "$FILE" > "$TMP"

            mv "$TMP" "$FILE"

            MESSAGE="New incident created: $TITLE"

            notify_discord "$MESSAGE"
          fi

          if [ "$ACTION" = "resolve" ]; then

            if [ -z "$INCIDENT_ID" ]; then
              echo "Incident ID is required"
              exit 1
            fi

            if ! jq -e \
              --arg id "$INCIDENT_ID" \
              '.[] | select(.id == $id)' \
              "$FILE" >/dev/null; then

              echo "Incident not found: $INCIDENT_ID"
              exit 1
            fi

            INCIDENT_TITLE=$(
              jq -r \
                --arg id "$INCIDENT_ID" \
                '.[] | select(.id == $id) | .title' \
                "$FILE"
            )

            TMP=$(mktemp)

            jq \
              --arg id "$INCIDENT_ID" \
              '
              map(
                if .id == $id and .status != "resolved" then
                  .status = "resolved"
                else
                  .
                end
              )
              ' "$FILE" > "$TMP"

            mv "$TMP" "$FILE"

            MESSAGE="Incident resolved: $INCIDENT_TITLE"

            notify_discord "$MESSAGE"
          fi

      - name: Commit
        run: |
          set -euo pipefail

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add output/incidents.json

          git diff --cached --quiet && exit 0

          git commit -m "Manual incident update"

          git pull --rebase origin main
          git push origin HEAD:main
