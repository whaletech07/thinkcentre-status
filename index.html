<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ThinkCentre Status</title>
  <link rel="icon" href="/assets/favicon.ico" />
  <link rel="stylesheet" href="/style.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ThinkCentre system status and incident tracking dashboard">
</head>
<body>
<header>
  <div>ThinkCentre Status</div>
</header>

<div class="container">
  <div class="status-card">
    <div id="circle" class="circle critical-circle" aria-label="system status">×</div>
    <div>
      <div id="title" class="title">System Status Unavailable</div>
      <div id="sub" class="sub">JavaScript is disabled. Please enable JavaScript and try again.</div>
    </div>
  </div>
  <div class="timeline" id="timeline">
    <h3 style="color:#aaa;">Recent Incidents</h3>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
